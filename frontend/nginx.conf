server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: kazdy nieznany route -> index.html (history API).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Brak cache dla index.html (zeby zmiana build-time vars byla widoczna).
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }
}
